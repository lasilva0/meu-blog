project:
  type: website
  output-dir: docs

website:
  title: "L-Stats Blog"
  description: "O que vou descobrindo em estatística, ciência de dados e matemática"
  navbar:
    background: "#0d9488"
    foreground: "#ffffff"
    title: "L-Stats Blog"
    left:
      - href: index.qmd
        text: Home
      - href: about.qmd
        text: Sobre
    right:
      - icon: github
        href: https://github.com/lasilva0
  page-footer:
    center: "© 2025 L-Stats Blog — Feito com [Quarto](https://quarto.org)"
    background: "#0d9488"
    foreground: "#ffffff"

format:
  html:
    theme:
      light: cosmo
      dark: slate
    css: [styles.css, styles-dark-override.css]
    include-after-body: toc-toggle.html
    toc: true
    toc-location: right
    toc-depth: 3
    toc-title: "Nesta página"
    mainfont: "Ubuntu, sans-serif"
    monofont: "JetBrains Mono, Fira Code, monospace"
